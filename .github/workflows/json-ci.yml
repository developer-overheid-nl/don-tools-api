name: JSON CI

on: pull_request

jobs:
  lint-and-validate:
    name: JSON Lint & OpenAPI Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Run Super-Linter
        uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_EXCLUDE: "(^|.*/)\\.vscode/|(^|.*/)tsconfig(\\..+)?\\.json$"
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_JSON: true
          VALIDATE_OPENAPI: true
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
          UPDATE_EXISTING_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
